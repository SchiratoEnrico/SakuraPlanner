# Authentication & User Errors
ERR_AUTH_001=Mail o password non validi.
ERR_AUTH_002=Esiste già un account con questa email.
ERR_AUTH_003=Questo username è già stato utilizzato.
ERR_AUTH_004=Account non abilitato. Verifica la mail prima di procedere.

# Trip & Itinerary Errors
ERR_TRIP_001=Non è stato possibile trovare il viaggio richiesto.
ERR_TRIP_002=Date del viaggio non valide. La data di inizio deve essere prima della data di fine.
ERR_TRIP_003=Il budget totale non può essere negativo.

# General Errors
ERR_GEN_001=Errore di sistema non previsto. Riprova più tardi.