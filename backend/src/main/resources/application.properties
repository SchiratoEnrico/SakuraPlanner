spring.application.name=backend

# =========================================================================
# DATABASE CONFIGURATION (POSTGRESQL)
# =========================================================================
# Spring Boot will automatically inject these variables from the system environment/.env file.
# Syntax: ${VARIABLE_NAME:DEFAULT_VALUE}
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================================
# HIBERNATE / JPA CONFIGURATION
# =========================================================================
# Automatically updates or creates database tables according to Java @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Enables logging of SQL queries to the console for easier debugging
spring.jpa.show-sql=true

# Formats the logged SQL to be human-readable instead of a single long line
spring.jpa.properties.hibernate.format_sql=true